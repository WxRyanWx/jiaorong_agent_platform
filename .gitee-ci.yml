# 构建镜像：Linux用ubuntu，Windows/Mac会自动切换对应构建机，image字段仅Linux生效
image: ubuntu:22.04

# 缓存pnpm依赖，加速构建
cache:
  paths:
    - ~/.local/share/pnpm
    - node_modules

# 全局环境变量
variables:
  NODE_VERSION: "24.14.1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# 构建只有一个阶段：打包
stages:
  - build

build_job:
  stage: build
  script:
    # ========== 1. 安装Node + pnpm（替代setup-node、pnpm/action-setup） ==========
    - |
      if [ "$CI_RUNNER_OS" = "windows" ]; then
        choco install nodejs --version=$NODE_VERSION
        npm install -g pnpm
      elif [ "$CI_RUNNER_OS" = "darwin" ]; then
        brew install node@24
        npm install -g pnpm
      else
        # Linux
        curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
        apt-get install -y nodejs
        npm install -g pnpm
      fi

    # 打印系统信息
    - node -v
    - pnpm -v

    # ========== 2. 安装依赖 ==========
    - pnpm config set registry shturl.cc/04Y2ksbitVPvFjoy597z
    - pnpm install

    # 安装sharp 区分系统架构
    - |
      case $CI_RUNNER_OS in
        windows) export TARGET_OS=win32 ;;
        darwin) export TARGET_OS=darwin ;;
        linux) export TARGET_OS=linux ;;
      esac
      export TARGET_ARCH=$(node -p "process.arch")
      pnpm run install:sharp

    # 重新安装带平台编译参数
    - |
      export npm_config_build_from_source=true
      export npm_config_platform=$TARGET_OS
      export npm_config_arch=$TARGET_ARCH
      pnpm install

    # ========== 3. 运行对应系统构建脚本 ==========
    - |
      # 注入前端环境变量
      export VITE_GITHUB_CLIENT_ID=${DC_GITHUB_CLIENT_ID}
      export VITE_GITHUB_CLIENT_SECRET=${DC_GITHUB_CLIENT_SECRET}
      export VITE_GITHUB_REDIRECT_URI=${DC_GITHUB_REDIRECT_URI}
      export VITE_PROVIDER_DB_URL=${CDN_PROVIDER_DB_URL}
      export NODE_OPTIONS="--max-old-space-size=4096"

      pnpm run build

      # 插件打包逻辑
      pnpm run plugin:bundle -- --name feishu --platform $TARGET_OS --arch $TARGET_ARCH
      if [ "$CI_RUNNER_OS" = "darwin" ]; then
        SWIFTCI_ALLOW_UNSIGNED_TOOLS=1 pnpm run plugin:cua:build:mac:$TARGET_ARCH
        pnpm run plugin:bundle -- --name cua --platform darwin --arch $TARGET_ARCH
      fi

      # electron-builder打包，不推送
      pnpm exec electron-builder --$TARGET_OS --$TARGET_ARCH --publish=never

    # ========== 4. 插件校验 ==========
    - |
      case $CI_RUNNER_OS in
        win32) PLUGIN_ROOT="dist/${TARGET_ARCH}-unpacked/resources/app.asar.unpacked/plugins" ;;
        linux) PLUGIN_ROOT="dist/linux-unpacked/resources/app.asar.unpacked/plugins" ;;
        darwin)
          if [ "$TARGET_ARCH" = "arm64" ]; then
            APP_DIR="dist/mac-arm64/DeepChat.app"
          else
            APP_DIR="dist/mac/DeepChat.app"
          fi
          PLUGIN_ROOT="${APP_DIR}/Contents/Resources/app.asar.unpacked/plugins"
        ;;
      esac
      pnpm run plugin:verify -- --name feishu --platform $TARGET_OS --arch $TARGET_ARCH --plugin-root "$PLUGIN_ROOT"
      if [ "$CI_RUNNER_OS" = "darwin" ]; then
        pnpm run plugin:verify -- --name cua --platform darwin --arch "$TARGET_ARCH" --plugin-root "$PLUGIN_ROOT"
      fi

  # 定义构建产物（替代upload-artifact）
  artifacts:
    paths:
      - dist/*.exe
      - dist/*.dmg
      - dist/*.deb
      - dist/*.rpm
    expire_in: 14d
